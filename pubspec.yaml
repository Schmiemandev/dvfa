name: dvfa
description: "A Damn Vulnerable Flutter App designed to teach mobile security, reverse engineering, and OWASP MASVS principles."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.4
  http: ^1.2.1
  crypto: ^3.0.6
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.4.0+2
  sqlite3_flutter_libs: ^0.5.42
  path: ^1.9.1
  app_links: ^6.4.1
  encrypt: ^5.0.3
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
